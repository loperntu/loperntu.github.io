# Deploy GitHub Pages directly from docs/
# docs/tol/ is now committed to git, no copy step needed.
# In repo Settings → Pages, set Source to "GitHub Actions".
name: Deploy Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug - verify tol/ contents
        run: |
          echo "=== docs/tol/ contents ==="
          ls -la docs/tol/ || echo "docs/tol/ not found"
          echo "=== total files in docs/ ==="
          find docs/ -type f | wc -l

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
