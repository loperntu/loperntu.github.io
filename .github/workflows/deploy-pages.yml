# GitHub Pages deploys automatically from main branch /docs folder.
# (Settings → Pages → Source: Deploy from a branch → main, /docs)
# This workflow just validates the docs/ structure on each push.
name: Validate docs

on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify key pages exist
        run: |
          echo "=== docs/ structure ==="
          ls docs/
          echo "=== docs/tol/ ==="
          ls docs/tol/
          echo "=== posts count ==="
          ls docs/posts/ | wc -l
          echo "=== checking no Quarto references in posts ==="
          count=$(grep -rl "quarto" docs/posts/*/index.html 2>/dev/null | wc -l)
          echo "Posts with quarto refs: $count (expected 0)"
          [ "$count" -eq 0 ] || exit 1
          echo "All checks passed."
