<section class="level1" id="雜思筆記">
<h1>雜思筆記</h1>
<p>首先，你是看不到光的。任何透光的東西你也看不到。 你看得到我的手，是因為它擋住光。是因為我們的視覺器官只看得到擋住光的東西。</p>
<p>有光，才知道有縫隙。</p>
<blockquote class="blockquote">
<p>夫門當夜閉，閉而見月光，是有間隙也。~ 徐鍇繫傳。</p>
</blockquote>
<p>不過，因為有縫，才見得到光；</p>
<blockquote class="blockquote">
<p>There is a crack in everything, that’s how the light gets in. ~ Leonard Cohen</p>
</blockquote>
