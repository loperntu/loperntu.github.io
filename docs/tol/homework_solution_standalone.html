<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>語義學模擬器 — Homework Solution</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Noto Serif TC", "PingFang TC", "Microsoft JhengHei", serif;
      margin: 0; min-height: 100vh; color: #1e293b;
      background: #f1f5f9; padding: 0; line-height: 1.6;
    }
    .app { display: flex; flex-direction: column; min-height: 100vh; }
    @media (min-width: 768px) { .app { flex-direction: row; } }
    .sidebar {
      width: 100%; background: #0f172a; color: #cbd5e1;
      padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,.2);
    }
    @media (min-width: 768px) { .sidebar { width: 16rem; flex-shrink: 0; } }
    .sidebar h1 { margin: 0; font-size: 1.25rem; font-weight: 700; color: #fff; }
    .sidebar p.sub { margin: .5rem 0 1rem; font-size: .75rem; color: #64748b; }
    .sidebar .label { font-size: .7rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .05em; margin-bottom: .75rem; padding-left: .5rem; }
    .sidebar button {
      display: block; width: 100%; text-align: left; padding: .75rem 1rem; margin-bottom: .5rem;
      border: none; border-radius: 8px; font: inherit; font-size: .9rem; cursor: pointer;
      background: transparent; color: #cbd5e1; transition: all .2s;
    }
    .sidebar button:hover { background: #1e293b; color: #fff; }
    .sidebar button.active { background: #3b82f6; color: #fff; }
    .sidebar button.active.manx { background: #059669; }
    .sidebar .tip { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #334155; font-size: .8rem; color: #94a3b8; }
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #f8fafc; }
    .topbar {
      background: #fff; border-bottom: 1px solid #e2e8f0; padding: 1rem 1.5rem;
      display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 1rem;
    }
    .topbar h2 { margin: 0; font-size: 1.15rem; font-weight: 700; color: #334155; }
    .mode-group { display: flex; background: #f1f5f9; padding: 4px; border-radius: 10px; }
    .mode-group button {
      padding: .5rem 1rem; border: none; border-radius: 8px; font: inherit; font-size: .875rem; font-weight: 500;
      cursor: pointer; background: transparent; color: #64748b; transition: all .2s;
    }
    .mode-group button:hover { color: #334155; }
    .mode-group button.active { background: #fff; color: #1e293b; box-shadow: 0 1px 2px rgba(0,0,0,.06); }
    .content { flex: 1; overflow: auto; padding: 1.5rem; }
    .view { display: none; flex-direction: column; height: 100%; max-width: 56rem; margin: 0 auto; }
    .view.active { display: flex; }
    .view-header { padding: 1rem 1.25rem; border-radius: 12px; margin-bottom: 1rem; }
    .view-header.kalam-g { background: #eff6ff; border: 1px solid #bfdbfe; }
    .view-header.kalam-m { background: #eef2ff; border: 1px solid #c7d2fe; }
    .view-header.manx-g { background: #ecfdf5; border: 1px solid #a7f3d0; }
    .view-header.manx-m { background: #f0fdfa; border: 1px solid #99f6e4; }
    .view-header h3 { margin: 0 0 .35rem; font-size: 1.05rem; font-weight: 700; }
    .view-header.kalam-g h3 { color: #1e40af; }
    .view-header.kalam-m h3 { color: #3730a3; }
    .view-header.manx-g h3 { color: #065f46; }
    .view-header.manx-m h3 { color: #0f766e; }
    .view-header p { margin: 0; font-size: .9rem; opacity: .92; white-space: pre-line; }
    .view-body { flex: 1; min-height: 400px; background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; padding: 1rem; overflow: auto; }
    .view-body.center { display: flex; align-items: center; justify-content: center; }
    .step-bar {
      margin-top: 1rem; background: #fff; border-radius: 12px; border: 1px solid #e2e8f0;
      padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center;
    }
    .step-bar button {
      padding: .5rem 1.25rem; border-radius: 8px; font: inherit; font-size: .9rem; font-weight: 600;
      cursor: pointer; border: 1px solid #e2e8f0; background: #f8fafc; color: #475569;
    }
    .step-bar button:hover:not(:disabled) { background: #f1f5f9; color: #334155; }
    .step-bar button:disabled { opacity: .5; cursor: not-allowed; }
    .step-bar button.next { background: #0ea5e9; border-color: #0ea5e9; color: #fff; }
    .step-bar button.next.manx { background: #059669; border-color: #059669; }
    .step-bar button.next:hover:not(:disabled) { filter: brightness(1.08); }
    .dots { display: flex; gap: .5rem; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #cbd5e1; transition: all .2s; }
    .dot.active { transform: scale(1.3); }
    .dot.active.kalam { background: #0ea5e9; }
    .dot.active.manx { background: #059669; }
    table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    th, td { padding: .65rem .85rem; text-align: left; border-bottom: 1px solid #f1f5f9; }
    th { background: #f8fafc; color: #64748b; font-weight: 600; }
    .formula-box { background: #1e293b; color: #e2e8f0; border-radius: 10px; padding: 1rem 1.25rem; margin-top: 1rem; font-size: .85rem; border-left: 4px solid #0ea5e9; }
    .formula-box.manx { border-left-color: #059669; }
    .formula-box h4 { margin: 0 0 .5rem; color: #7dd3fc; font-size: .9rem; }
    .formula-box.manx h4 { color: #6ee7b7; }
    svg { max-width: 100%; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="語言與模式">
      <h1>語義學模擬器</h1>
      <p class="sub">Homework Solution</p>
      <p class="label">語言選擇</p>
      <button type="button" id="btn-kalam" class="active">卡拉姆語 (Kalam)</button>
      <button type="button" id="btn-manx">馬恩語 (Manx)</button>
      <p class="label">解法</p>
      <button type="button" id="btn-graph" class="active">圖表結構法</button>
      <button type="button" id="btn-matrix">矩陣特徵法</button>
      <p class="tip">卡拉姆語考驗「通用動詞組合」；馬恩語考驗「曆法與狀態對應」。</p>
    </aside>
    <main class="main">
      <header class="topbar">
        <h2 id="main-title">卡拉姆語：事件與感知分解</h2>
        <div class="mode-group">
          <button type="button" id="btn-mode-graph" class="active">圖表結構法</button>
          <button type="button" id="btn-mode-matrix">矩陣特徵法</button>
        </div>
      </header>
      <div class="content">
        <section class="view active" id="view-kalam-graph" aria-labelledby="kalam-g-title">
          <div class="view-header kalam-g">
            <h3 id="kalam-g-title">步驟 1：識別通用動詞</h3>
            <p id="kalam-g-desc"></p>
          </div>
          <div class="view-body center">
            <svg id="svg-kalam" width="650" height="550" viewBox="0 0 650 550" aria-hidden="true"></svg>
          </div>
        </section>
        <section class="view" id="view-kalam-matrix" aria-labelledby="kalam-m-title">
          <div class="view-header kalam-m">
            <h3 id="kalam-m-title">步驟 1：建立詞彙解構矩陣</h3>
            <p id="kalam-m-desc"></p>
          </div>
          <div class="view-body">
            <table><thead><tr><th>卡拉姆短語</th><th>名詞/副詞</th><th>通用動詞</th><th>翻譯</th></tr></thead><tbody id="kalam-m-tbody"></tbody></table>
            <div class="formula-box" id="kalam-formula" style="display:none;"></div>
          </div>
        </section>
        <section class="view" id="view-manx-graph" aria-labelledby="manx-g-title">
          <div class="view-header manx-g">
            <h3 id="manx-g-title">步驟 1：尋找共用詞彙</h3>
            <p id="manx-g-desc"></p>
          </div>
          <div class="view-body center">
            <svg id="svg-manx" width="650" height="550" viewBox="0 0 650 550" aria-hidden="true"></svg>
          </div>
        </section>
        <section class="view" id="view-manx-matrix" aria-labelledby="manx-m-title">
          <div class="view-header manx-m">
            <h3 id="manx-m-title">步驟 1：基礎交集比對</h3>
            <p id="manx-m-desc"></p>
          </div>
          <div class="view-body">
            <table><thead><tr><th>馬恩語詞彙</th><th>狀態/時間</th><th>核心概念</th><th>翻譯</th></tr></thead><tbody id="manx-m-tbody"></tbody></table>
            <div class="formula-box manx" id="manx-formula" style="display:none;"></div>
          </div>
        </section>
        <div class="step-bar">
          <button type="button" id="step-prev" disabled>← 上一步</button>
          <div class="dots" id="step-dots"></div>
          <button type="button" id="step-next" class="next">下一步 →</button>
        </div>
      </div>
    </main>
  </div>
  <script>
(function () {
  'use strict';

  var kalamNodes = [
    { id: 'in', label: 'in (消耗)', x: 450, y: 150, type: 'verb' },
    { id: 'nn', label: 'nn (感知)', x: 450, y: 350, type: 'verb' },
    { id: 'ag', label: 'ag (發聲)', x: 150, y: 350, type: 'verb' },
    { id: 'sy', label: 'sy (偷偷)', x: 450, y: 500, type: 'adv' },
    { id: 'cgoy', label: 'cgoy (煙草)', x: 200, y: 100, type: 'noun' },
    { id: 'tap', label: 'tap (東西)', x: 200, y: 200, type: 'noun' },
    { id: 'gos', label: 'gos (思想)', x: 200, y: 250, type: 'noun' },
    { id: 'wdn', label: 'wdn (眼睛)', x: 200, y: 450, type: 'noun' },
    { id: 'gwglwn', label: 'gwglwn (鼾聲)', x: 150, y: 200, type: 'noun' },
    { id: 'tmwd', label: 'tmwd (耳朵)', x: 300, y: 350, type: 'noun' },
    { id: 'd', label: 'd (拿/得)', x: 200, y: 500, type: 'verb' }
  ];
  var kalamEdges = [
    { source: 'cgoy', target: 'in', label: 'cgoy in', eng: '吸煙 (B)', id: 'k1' },
    { source: 'tap', target: 'in', label: 'tap in', eng: '吃 (E)', id: 'k2' },
    { source: 'gwglwn', target: 'ag', label: 'gwglwn ag', eng: '打鼾 (C)', id: 'k3' },
    { source: 'gos', target: 'nn', label: 'gos nn', eng: '想 (I)', id: 'k4' },
    { source: 'wdn', target: 'nn', label: 'wdn nn', eng: '看 (A)', id: 'k5' },
    { source: 'ag', target: 'tmwd', label: 'ag + tmwd', eng: '聲音入耳', id: 'k6' },
    { source: 'tmwd', target: 'nn', label: '+ nn', eng: '聽 (G)', id: 'k7' },
    { source: 'sy', target: 'd', label: 'sy d', eng: '偷 (D)', id: 'k8' }
  ];
  var manxNodes = [
    { id: 'jerrey', label: 'Jerrey (末)', x: 150, y: 120, type: 'time' },
    { id: 'toshiaght', label: 'Tosh. (初)', x: 350, y: 120, type: 'time' },
    { id: 'mean', label: 'Mean (中)', x: 550, y: 120, type: 'time' },
    { id: 'geuree', label: 'Geuree (冬)', x: 150, y: 320, type: 'season' },
    { id: 'arree', label: 'Arree (春)', x: 350, y: 320, type: 'season' },
    { id: 'souree', label: 'Souree (夏)', x: 550, y: 320, type: 'season' },
    { id: 'cadley', label: 'cadley (眠)', x: 250, y: 480, type: 'core' },
    { id: 'oie', label: 'oie (夜)', x: 450, y: 480, type: 'core' }
  ];
  var manxEdges = [
    { source: 'mean', target: 'oie', label: 'mean oie', eng: '午夜 (C)', id: 'm1', lx: 500, ly: 300 },
    { source: 'oie', target: 'cadley', label: '+ gyn (無)', eng: '不眠之夜 (H)', id: 'm2', lx: 350, ly: 480 },
    { source: 'cadley', target: 'geuree', label: 'cadley geuree', eng: '冬眠 (F)', id: 'm3', lx: 200, ly: 400 },
    { source: 'jerrey', target: 'geuree', label: 'Jerrey Geuree', eng: '一月 (B)', id: 'm4', lx: 150, ly: 220 },
    { source: 'toshiaght', target: 'arree', label: 'Tosh. Arree', eng: '二月 (D)', id: 'm5', lx: 350, ly: 220 },
    { source: 'toshiaght', target: 'souree', label: 'Tosh. Souree', eng: '五月 (G)', id: 'm6', lx: 450, ly: 220 },
    { source: 'mean', target: 'souree', label: 'Mean Souree', eng: '六月 (E)', id: 'm7', lx: 550, ly: 220 },
    { source: 'jerrey', target: 'souree', label: 'Jerrey Souree', eng: '七月 (A)', id: 'm8', lx: 300, ly: 180 }
  ];

  var kalamGSteps = [
    { title: '步驟 1：識別通用動詞 (Generic Verbs)', desc: '卡拉姆語中，具體動作由「通用動詞」搭配名詞產生。觀察語料，in (消耗)、nn (感知)、ag (發聲) 是最常出現的樞紐節點。' },
    { title: '步驟 2：物理動作的組合', desc: 'cgoy(煙草) + in(消耗) = 吸煙；tap(東西) + in(消耗) = 吃。\ngwglwn(鼾聲) 單獨是名詞，加上 ag(發聲) 就變成了動詞「打鼾」。' },
    { title: '步驟 3：感官與認知的隱喻', desc: 'nn 是接收資訊的大腦行為。gos(思想) + nn = 想；wdn(眼睛) + nn = 看。\n最精彩的是「聽」：ag(聲音) 進入 tmwd(耳朵)，再進行 nn(感知) = 聽！' },
    { title: '步驟 4：副詞修飾與行為', desc: 'sy 帶有「偷偷摸摸、非法」的意思。\nsy + d(拿) = 偷竊 (D)。\nsy + bsg(坐) = 篡位/坐在別人的位置上 (H)。' }
  ];
  var kalamMSteps = [
    { title: '步驟 1：建立詞彙解構矩陣', desc: '將卡拉姆語動詞拆解為「名詞/副詞」+「通用動詞」。這是一種代數消去法。' },
    { title: '步驟 2：解析通用動詞 in, nn, ag', desc: 'tap(東西) in = 吃；cgoy(煙) in = 吸煙 ➔ in = 攝入/消耗。\nwdn(眼) nn = 看；gos(思想) nn = 想 ➔ nn = 感知。\nesek(謊) ag = 撒謊；gwglwn(鼾) ag = 打鼾 ➔ ag = 發出聲響。' },
    { title: '步驟 3：解析副詞與形容詞', desc: 'gos nn(想) vs gos tep nn(贊成) ➔ tep = 好的 (想好的)。\nsy d(偷) vs sy bsg(霸佔座位) ➔ sy = 偷偷地/非法地。' },
    { title: '步驟 4：進階翻譯推導', desc: '根據已知的字典，我們可以反向翻譯出：\n「笑否決侵入」、「tep」、「sy ñg in」、「kmn sy ñag」等複雜句。' }
  ];
  var kalamMRows = [
    { w: 'tap in', r1: 'tap (東西)', r2: 'in (消耗)', mean: '吃 (E)', step: 1 },
    { w: 'cgoy in', r1: 'cgoy (煙草)', r2: 'in (消耗)', mean: '吸煙 (B)', step: 1 },
    { w: 'wdn nn', r1: 'wdn (眼睛)', r2: 'nn (感知)', mean: '看 (A)', step: 1 },
    { w: 'gos nn', r1: 'gos (思想)', r2: 'nn (感知)', mean: '想 (I)', step: 1 },
    { w: 'ag tmwd nn', r1: 'ag(聲)+tmwd(耳)', r2: 'nn (感知)', mean: '聽 (G)', step: 1 },
    { w: 'esek ag', r1: 'esek (假)', r2: 'ag (發聲)', mean: '撒謊 (F)', step: 1 },
    { w: 'gos tep nn', r1: 'gos + tep(好)', r2: 'nn (感知)', mean: '贊成 (J)', step: 2 },
    { w: 'sy d', r1: 'sy (偷偷)', r2: 'd (拿)', mean: '偷 (D)', step: 2 },
    { w: 'sy bsg', r1: 'sy (偷偷)', r2: 'bsg (坐)', mean: '篡位/坐某人位 (H)', step: 2 }
  ];
  var manxGSteps = [
    { title: '步驟 1：尋找共用詞彙 (Overlaps)', desc: '觀察語料，oie 與 cadley 反覆出現。對照翻譯中的「午夜、不眠之夜、冬眠」，推導出交集：oie(夜)、cadley(眠)、mean(中)、geuree(冬)。' },
    { title: '步驟 2：提取時間與季節 (Time & Seasons)', desc: '我們發現了一套時間修飾系統：除了 Geuree(冬)，還有 Arree(春)、Souree(夏)。而修飾時間的詞有 Toshiaght(初)、Mean(中)、Jerrey(末)。' },
    { title: '步驟 3：塞爾特曆法映射 (Celtic Calendar)', desc: '塞爾特文化中，春季始於2月，夏季始於5月，冬季始於11月(萬聖節)。因此 Toshiaght Souree(夏初) 正好對應五月(May)！' },
    { title: '步驟 4：完整網絡與月份推導', desc: 'Jerrey Geuree(冬末)=1月；Tosh. Arree(春初)=2月；Mean Souree(仲夏)=6月；Jerrey Souree(夏末)=7月。這是一套完美的自然曆法系統！' }
  ];
  var manxMSteps = [
    { title: '步驟 1：基礎交集比對', desc: '將修飾語與核心概念分離。午夜、不眠之夜、冬眠 ➔ 推導出 oie(夜), cadley(眠), geuree(冬)。' },
    { title: '步驟 2：解析季節系統', desc: 'Arree(春), Souree(夏) ＋ Toshiaght(初), Mean(中), Jerrey(末)。' },
    { title: '步驟 3：塞爾特曆法對應', desc: '夏初 = 5月，夏中 = 6月，夏末 = 7月；\n冬末 = 1月，春初 = 2月。' },
    { title: '步驟 4：進階翻譯解答', desc: '運用已解析出的規律，進行未出現詞彙的雙向翻譯。' }
  ];
  var manxMRows = [
    { w: 'mean oie', r1: 'mean (中)', r2: 'oie (夜)', mean: '午夜 (C)', step: 0 },
    { w: 'oie gyn cadley', r1: 'gyn (無)', r2: 'oie / cadley', mean: '不眠之夜 (H)', step: 0 },
    { w: 'cadley geuree', r1: 'cadley (眠)', r2: 'geuree (冬)', mean: '冬眠 (F)', step: 0 },
    { w: 'Toshiaght Souree', r1: 'Toshiaght (初)', r2: 'Souree (夏)', mean: '五月 (G)', step: 2 },
    { w: 'Mean Souree', r1: 'Mean (中)', r2: 'Souree (夏)', mean: '六月 (E)', step: 2 },
    { w: 'Jerrey Geuree', r1: 'Jerrey (末)', r2: 'Geuree (冬)', mean: '一月 (B)', step: 2 }
  ];

  var state = { lang: 'kalam', mode: 'graph', step: 0 };

  function get(id) { return document.getElementById(id); }
  function showPanel() {
    var v = state.lang + '-' + state.mode;
    document.querySelectorAll('.view').forEach(function (el) { el.classList.remove('active'); });
    var panel = get('view-' + v);
    if (panel) panel.classList.add('active');
    get('main-title').textContent = state.lang === 'kalam' ? '卡拉姆語：事件與感知分解' : '馬恩語：塞爾特自然曆法';
    document.querySelectorAll('.sidebar button').forEach(function (b) {
      b.classList.remove('active', 'manx');
      if (b.id === 'btn-kalam' && state.lang === 'kalam') b.classList.add('active');
      if (b.id === 'btn-manx' && state.lang === 'manx') { b.classList.add('active', 'manx'); }
      if (b.id === 'btn-graph' && state.mode === 'graph') b.classList.add('active');
      if (b.id === 'btn-matrix' && state.mode === 'matrix') b.classList.add('active');
    });
    document.querySelectorAll('.mode-group button').forEach(function (b) {
      b.classList.toggle('active', (b.id === 'btn-mode-graph' && state.mode === 'graph') || (b.id === 'btn-mode-matrix' && state.mode === 'matrix'));
    });
    var nextBtn = get('step-next');
    nextBtn.classList.toggle('manx', state.lang === 'manx');
    state.step = 0;
    renderStepBar();
    renderCurrent();
  }

  function renderStepBar() {
    get('step-prev').disabled = state.step === 0;
    get('step-next').disabled = state.step === 3;
    var dots = get('step-dots');
    dots.innerHTML = '';
    for (var i = 0; i < 4; i++) {
      var d = document.createElement('div');
      d.className = 'dot' + (i === state.step ? ' active ' + state.lang : '');
      dots.appendChild(d);
    }
  }

  function renderCurrent() {
    if (state.lang === 'kalam' && state.mode === 'graph') renderKalamGraph();
    else if (state.lang === 'kalam' && state.mode === 'matrix') renderKalamMatrix();
    else if (state.lang === 'manx' && state.mode === 'graph') renderManxGraph();
    else renderManxMatrix();
  }

  function renderKalamGraph() {
    var step = state.step;
    get('kalam-g-title').textContent = kalamGSteps[step].title;
    get('kalam-g-desc').textContent = kalamGSteps[step].desc;
    var svg = get('svg-kalam');
    svg.innerHTML = '';
    var defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
    defs.innerHTML = '<marker id="arrow-k" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#94a3b8"/></marker>';
    svg.appendChild(defs);
    var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    var nodeById = {};
    kalamNodes.forEach(function (n) { nodeById[n.id] = n; });
    kalamEdges.forEach(function (edge, index) {
      if (step < 1) return;
      if (step === 1 && index > 2) return;
      if (step === 2 && index > 6) return;
      var s = nodeById[edge.source], t = nodeById[edge.target];
      if (!s || !t) return;
      var mx = (s.x + t.x) / 2, my = (s.y + t.y) / 2;
      var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', s.x); line.setAttribute('y1', s.y); line.setAttribute('x2', t.x); line.setAttribute('y2', t.y);
      line.setAttribute('stroke', '#cbd5e1'); line.setAttribute('stroke-width', 3); line.setAttribute('marker-end', 'url(#arrow-k)');
      g.appendChild(line);
      var rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', mx - 35); rect.setAttribute('y', my - 12); rect.setAttribute('width', 70); rect.setAttribute('height', 24); rect.setAttribute('rx', 4);
      rect.setAttribute('fill', 'white'); rect.setAttribute('stroke', '#e2e8f0');
      g.appendChild(rect);
      var t1 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t1.setAttribute('x', mx); t1.setAttribute('y', my + 4); t1.setAttribute('text-anchor', 'middle'); t1.setAttribute('font-size', 11); t1.setAttribute('font-weight', 'bold'); t1.setAttribute('fill', '#475569');
      t1.textContent = edge.label;
      g.appendChild(t1);
      var showEng = step >= (index <= 2 ? 1 : index <= 6 ? 2 : 3);
      if (showEng) {
        var t2 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        t2.setAttribute('x', mx); t2.setAttribute('y', my + 25); t2.setAttribute('text-anchor', 'middle'); t2.setAttribute('font-size', 13); t2.setAttribute('font-weight', 'bold'); t2.setAttribute('fill', '#0284c7');
        t2.textContent = edge.eng;
        g.appendChild(t2);
      }
    });
    kalamNodes.forEach(function (node) {
      if (step === 0 && (node.id === 'sy' || node.id === 'd')) return;
      if (step === 1 && node.type === 'noun' && ['cgoy', 'tap', 'gwglwn'].indexOf(node.id) === -1) return;
      if (step === 2 && (node.id === 'sy' || node.id === 'd')) return;
      var fill = node.type === 'verb' ? '#0ea5e9' : node.type === 'noun' ? '#f59e0b' : '#ef4444';
      var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', node.x); circle.setAttribute('cy', node.y); circle.setAttribute('r', 28);
      circle.setAttribute('fill', fill); circle.setAttribute('stroke', 'white'); circle.setAttribute('stroke-width', 3);
      g.appendChild(circle);
      var t1 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t1.setAttribute('x', node.x); t1.setAttribute('y', node.y - 35); t1.setAttribute('text-anchor', 'middle'); t1.setAttribute('font-size', 14); t1.setAttribute('font-weight', 'bold'); t1.setAttribute('fill', '#1e293b');
      t1.textContent = node.id;
      g.appendChild(t1);
      var t2 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t2.setAttribute('x', node.x); t2.setAttribute('y', node.y + 5); t2.setAttribute('text-anchor', 'middle'); t2.setAttribute('font-size', 11); t2.setAttribute('font-weight', 'bold'); t2.setAttribute('fill', 'white');
      t2.textContent = node.label.match(/\((.*?)\)/)[1];
      g.appendChild(t2);
    });
    svg.appendChild(g);
  }

  function renderKalamMatrix() {
    var step = state.step;
    get('kalam-m-title').textContent = kalamMSteps[step].title;
    get('kalam-m-desc').textContent = kalamMSteps[step].desc;
    var tbody = get('kalam-m-tbody');
    tbody.innerHTML = kalamMRows.map(function (row) {
      var show = step >= row.step;
      return '<tr><td><code>' + row.w + '</code></td><td>' + row.r1 + '</td><td>' + row.r2 + '</td><td>' + (show ? row.mean : '?') + '</td></tr>';
    }).join('');
    var box = get('kalam-formula');
    if (step >= 3) {
      box.style.display = 'block';
      box.innerHTML = '<h4>翻譯任務解答 (Translations)</h4><p>1. 笑: kwk(笑) + ag(發聲) = <strong>kwk ag</strong></p><p>2. 否決: gos(想) + tmey(壞) + nn(感知) = <strong>gos tmey nn</strong></p><p>3. 侵入: sy(偷偷) + am(去) = <strong>sy am</strong></p><p>4. tep: = <strong>好 (Good)</strong></p><p>5. sy ñg in: 偷偷 + 水 + 喝 = <strong>偷喝水</strong></p><p>6. kmn sy ñag: 飛禽 + 偷偷 + 射 = <strong>盜獵/偷射飛禽</strong></p>';
    } else box.style.display = 'none';
  }

  function renderManxGraph() {
    var step = state.step;
    get('manx-g-title').textContent = manxGSteps[step].title;
    get('manx-g-desc').textContent = manxGSteps[step].desc;
    var svg = get('svg-manx');
    svg.innerHTML = '';
    var defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
    defs.innerHTML = '<marker id="arrow-m" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#94a3b8"/></marker>';
    svg.appendChild(defs);
    var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    var nodeById = {};
    manxNodes.forEach(function (n) { nodeById[n.id] = n; });
    manxEdges.forEach(function (edge) {
      if (step === 0 && /m[45678]/.test(edge.id)) return;
      var s = nodeById[edge.source], t = nodeById[edge.target];
      if (!s || !t) return;
      var lx = edge.lx || (s.x + t.x) / 2, ly = edge.ly || (s.y + t.y) / 2;
      var showEng = /m[123]/.test(edge.id) || (step >= 2 && /m[678]/.test(edge.id)) || step >= 3;
      var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', s.x); line.setAttribute('y1', s.y); line.setAttribute('x2', t.x); line.setAttribute('y2', t.y);
      line.setAttribute('stroke', '#cbd5e1'); line.setAttribute('stroke-width', 3); line.setAttribute('marker-end', 'url(#arrow-m)');
      g.appendChild(line);
      var rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', lx - 45); rect.setAttribute('y', ly - 12); rect.setAttribute('width', 90); rect.setAttribute('height', 24); rect.setAttribute('rx', 4);
      rect.setAttribute('fill', 'white'); rect.setAttribute('stroke', '#e2e8f0');
      g.appendChild(rect);
      var t1 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t1.setAttribute('x', lx); t1.setAttribute('y', ly + 4); t1.setAttribute('text-anchor', 'middle'); t1.setAttribute('font-size', 11); t1.setAttribute('font-weight', 'bold'); t1.setAttribute('fill', '#475569');
      t1.textContent = edge.label;
      g.appendChild(t1);
      if (showEng) {
        var t2 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        t2.setAttribute('x', lx); t2.setAttribute('y', ly + 25); t2.setAttribute('text-anchor', 'middle'); t2.setAttribute('font-size', 13); t2.setAttribute('font-weight', 'bold'); t2.setAttribute('fill', '#10b981');
        t2.textContent = edge.eng;
        g.appendChild(t2);
      }
    });
    manxNodes.forEach(function (node) {
      if (step === 0 && /arree|souree|toshiaght|jerrey/.test(node.id)) return;
      var fill = node.type === 'core' ? '#f43f5e' : node.type === 'season' ? '#0ea5e9' : '#8b5cf6';
      var rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', node.x - 45); rect.setAttribute('y', node.y - 25); rect.setAttribute('width', 90); rect.setAttribute('height', 50); rect.setAttribute('rx', 12);
      rect.setAttribute('fill', fill); rect.setAttribute('stroke', 'white'); rect.setAttribute('stroke-width', 3);
      g.appendChild(rect);
      var t1 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t1.setAttribute('x', node.x); t1.setAttribute('y', node.y - 5); t1.setAttribute('text-anchor', 'middle'); t1.setAttribute('font-size', 14); t1.setAttribute('font-weight', 'bold'); t1.setAttribute('fill', 'white');
      t1.textContent = node.label.split(' ')[0];
      g.appendChild(t1);
      var t2 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t2.setAttribute('x', node.x); t2.setAttribute('y', node.y + 12); t2.setAttribute('text-anchor', 'middle'); t2.setAttribute('font-size', 12); t2.setAttribute('fill', '#f1f5f9');
      t2.textContent = node.label.match(/\((.*?)\)/)[1];
      g.appendChild(t2);
    });
    svg.appendChild(g);
  }

  function renderManxMatrix() {
    var step = state.step;
    get('manx-m-title').textContent = manxMSteps[step].title;
    get('manx-m-desc').textContent = manxMSteps[step].desc;
    var tbody = get('manx-m-tbody');
    tbody.innerHTML = manxMRows.map(function (row) {
      var show = step >= row.step;
      return '<tr><td><code>' + row.w + '</code></td><td>' + row.r1 + '</td><td>' + row.r2 + '</td><td>' + (show ? row.mean : '?') + '</td></tr>';
    }).join('');
    var box = get('manx-formula');
    if (step >= 3) {
      box.style.display = 'block';
      box.innerHTML = '<h4>翻譯任務解答 (Translations)</h4><p>9. Mean Fouyir (秋天的中間): = <strong>九月</strong></p><p>10. 無限 (無終點): 無(gyn) + 末(jerrey) = <strong>gyn jerrey</strong></p><p>11. 四月 (春末): 末(Jerrey) + 春(Arree) = <strong>Jerrey Arree</strong></p>';
    } else box.style.display = 'none';
  }

  get('btn-kalam').addEventListener('click', function () { state.lang = 'kalam'; showPanel(); });
  get('btn-manx').addEventListener('click', function () { state.lang = 'manx'; showPanel(); });
  get('btn-graph').addEventListener('click', function () { state.mode = 'graph'; showPanel(); });
  get('btn-matrix').addEventListener('click', function () { state.mode = 'matrix'; showPanel(); });
  get('btn-mode-graph').addEventListener('click', function () { state.mode = 'graph'; showPanel(); });
  get('btn-mode-matrix').addEventListener('click', function () { state.mode = 'matrix'; showPanel(); });
  get('step-prev').addEventListener('click', function () { if (state.step > 0) { state.step--; renderStepBar(); renderCurrent(); } });
  get('step-next').addEventListener('click', function () { if (state.step < 3) { state.step++; renderStepBar(); renderCurrent(); } });

  showPanel();
})();
  </script>
</body>
</html>
