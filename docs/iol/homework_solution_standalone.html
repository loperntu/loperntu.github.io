<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>語義學解題動態模擬：Manx & Kalam</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 Google Fonts (Noto Serif TC) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&display=swap" rel="stylesheet">
  
  <!-- 引入 React 與 ReactDOM (Standalone) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel 用於在瀏覽器中即時編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: 'Noto Serif TC', serif !important; }
    text { font-family: 'Noto Serif TC', serif !important; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-100">
<a href="index.html" id="tol-back-link" style="position:fixed;top:12px;left:12px;z-index:9999;background:rgba(15,118,110,0.92);color:white;font-family:'Noto Sans TC',sans-serif;font-size:0.78rem;font-weight:700;padding:6px 14px;border-radius:20px;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,0.2);letter-spacing:0.02em;backdrop-filter:blur(4px);">&#8592; TOL 首頁</a>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // --- 圖示元件 (替換原本的 Lucide 避免依賴) ---
    const IconChevronLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-2"><path d="m15 18-6-6 6-6"/></svg>;
    const IconChevronRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="ml-2"><path d="m9 18 6-6-6-6"/></svg>;
    const IconInfo = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="shrink-0 mt-0.5"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
    const IconNetwork = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-2"><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"/><path d="M12 12V8"/></svg>;
    const IconGrid = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>;
    const IconGlobe = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-3"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>;
    const IconBook = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-3"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
    const IconMessage = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-2 shrink-0 mt-0.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>;
    const IconDashboard = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-3 text-indigo-400"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>;

    // ==========================================
    // DATA: Kalam (卡拉姆語)
    // ==========================================
    const kalamNodes = [
      { id: 'in', label: 'in (消耗)', x: 450, y: 150, type: 'verb' },
      { id: 'nŋ', label: 'nŋ (感知)', x: 450, y: 350, type: 'verb' },
      { id: 'ag', label: 'ag (發聲)', x: 150, y: 350, type: 'verb' },
      { id: 'sy', label: 'sy (別人的)', x: 450, y: 500, type: 'noun' },
      { id: 'cgoy', label: 'cgoy (煙草)', x: 200, y: 100, type: 'noun' },
      { id: 'tap', label: 'tap (東西)', x: 200, y: 200, type: 'noun' },
      { id: 'gos', label: 'gos (思想)', x: 200, y: 250, type: 'noun' },
      { id: 'wdn', label: 'wdn (眼睛)', x: 200, y: 450, type: 'noun' },
      { id: 'gwglwn', label: 'gwglwn (鼾聲)', x: 150, y: 200, type: 'noun' },
      { id: 'tmwd', label: 'tmwd (耳朵)', x: 300, y: 350, type: 'noun' },
      { id: 'd', label: 'd (得到)', x: 200, y: 500, type: 'verb' },
    ];

    const kalamEdges = [
      { source: 'tap', target: 'in', label: 'tap in', eng: '吃 (E)', id: 'k1' },
      { source: 'cgoy', target: 'in', label: 'cgoy in', eng: '吸煙 (B)', id: 'k2' },
      { source: 'gwglwn', target: 'ag', label: 'gwglwn ag', eng: '打鼾 (C)', id: 'k3' },
      { source: 'gos', target: 'nŋ', label: 'gos nŋ', eng: '想 (I)', id: 'k4' },
      { source: 'wdn', target: 'nŋ', label: 'wdn nŋ', eng: '看 (A)', id: 'k5' },
      { source: 'ag', target: 'tmwd', label: 'ag + tmwd', eng: '聲音入耳', id: 'k6' },
      { source: 'tmwd', target: 'nŋ', label: '+ nŋ', eng: '聽 (G)', id: 'k7' },
      { source: 'sy', target: 'd', label: 'sy d', eng: '偷 (D)', id: 'k8' },
    ];

    // ==========================================
    // DATA: Manx (馬恩語)
    // ==========================================
    const manxNodes = [
      { id: 'jerrey', label: 'Jerrey (末)', x: 150, y: 120, type: 'time' },
      { id: 'toshiaght', label: 'Tosh. (初)', x: 350, y: 120, type: 'time' },
      { id: 'mean', label: 'Mean (中)', x: 550, y: 120, type: 'time' },
      { id: 'geuree', label: 'Geuree (冬)', x: 150, y: 320, type: 'season' },
      { id: 'arree', label: 'Arree (春)', x: 350, y: 320, type: 'season' },
      { id: 'souree', label: 'Souree (夏)', x: 550, y: 320, type: 'season' },
      { id: 'cadley', label: 'cadley (眠)', x: 250, y: 480, type: 'core' },
      { id: 'oie', label: 'oie (夜)', x: 450, y: 480, type: 'core' },
    ];

    const manxEdges = [
      { source: 'mean', target: 'oie', label: 'mean oie', eng: '午夜 (C)', id: 'm1', lx: 500, ly: 300 },
      { source: 'oie', target: 'cadley', label: '+ gyn (無)', eng: '不眠之夜 (H)', id: 'm2', lx: 350, ly: 480 },
      { source: 'cadley', target: 'geuree', label: 'cadley geuree', eng: '冬眠 (F)', id: 'm3', lx: 200, ly: 400 },
      { source: 'jerrey', target: 'geuree', label: 'Jerrey Geuree', eng: '一月 (B)', id: 'm4', lx: 150, ly: 220 },
      { source: 'toshiaght', target: 'arree', label: 'Tosh. Arree', eng: '二月 (D)', id: 'm5', lx: 350, ly: 220 },
      { source: 'toshiaght', target: 'souree', label: 'Tosh. Souree', eng: '五月 (G)', id: 'm6', lx: 450, ly: 220 },
      { source: 'mean', target: 'souree', label: 'Mean Souree', eng: '六月 (E)', id: 'm7', lx: 550, ly: 220 },
      { source: 'jerrey', target: 'souree', label: 'Jerrey Souree', eng: '七月 (A)', id: 'm8', lx: 300, ly: 180 },
    ];

    function App() {
      const [lang, setLang] = useState('kalam'); 
      const [activeMode, setActiveMode] = useState('graph');
      const [step, setStep] = useState(0);

      const handleViewChange = (newLang, newMode) => {
        if (newLang) setLang(newLang);
        if (newMode) setActiveMode(newMode);
        setStep(0);
      };

      // --- KALAM VIEWS ---
      const KalamGraphView = () => {
        const stepsInfo = [
          { title: "步驟 1：識別通用動詞 (Generic Verbs)", desc: "卡拉姆語中，具體動作由「通用動詞」搭配名詞產生。觀察語料，in (消耗)、nŋ (感知)、ag (發聲) 是最常出現的樞紐節點。" },
          { title: "步驟 2：物理動作的組合", desc: "tap(東西) + in(消耗) = 吃；cgoy(煙草) + in(消耗) = 吸煙。\ngwglwn(鼾聲) 單獨是名詞，加上 ag(發聲) 就變成了動詞「打鼾」。" },
          { title: "步驟 3：感官與認知的隱喻", desc: "nŋ 是接收資訊的大腦行為。gos(思想) + nŋ = 想；wdn(眼睛) + nŋ = 看。\n最精彩的是「聽」：ag(聲音) 進入 tmwd(耳朵)，再進行 nŋ(感知) = 聽！" },
          { title: "步驟 4：名詞屬性與犯罪行為", desc: "陷阱解析：sy 其實是名詞「別人的東西」。\nsy + d(得到) = 得到別人的東西 (偷)。\nsy + bsg(坐) = 坐在別人的位置上 (篡位)。" }
        ];

        return (
          <div className="flex flex-col h-full bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div className="p-4 bg-sky-50 border-b border-sky-100">
              <h3 className="text-lg font-bold text-sky-900">{stepsInfo[step].title}</h3>
              <p className="text-sm text-sky-800 mt-1 whitespace-pre-line">{stepsInfo[step].desc}</p>
            </div>
            <div className="flex-1 relative bg-slate-50 min-h-[450px] flex justify-center items-center p-4">
              <svg width="650" height="550" className="max-w-full drop-shadow-md">
                <defs>
                  <marker id="arrow-k" markerWidth="10" markerHeight="7" refX="25" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" /></marker>
                </defs>
                {step >= 1 && kalamEdges.map((edge, index) => {
                  if (step === 1 && index > 2) return null;
                  if (step === 2 && index > 6) return null;
                  const sourceNode = kalamNodes.find(n => n.id === edge.source);
                  const targetNode = kalamNodes.find(n => n.id === edge.target);
                  return (
                    <g key={edge.id} className="animate-fade-in">
                      <line x1={sourceNode.x} y1={sourceNode.y} x2={targetNode.x} y2={targetNode.y} stroke="#cbd5e1" strokeWidth="3" markerEnd="url(#arrow-k)" />
                      <rect x={(sourceNode.x + targetNode.x)/2 - 35} y={(sourceNode.y + targetNode.y)/2 - 12} width="70" height="24" rx="4" fill="white" stroke="#e2e8f0" />
                      <text x={(sourceNode.x + targetNode.x)/2} y={(sourceNode.y + targetNode.y)/2 + 4} textAnchor="middle" fontSize="11" fill="#475569" fontWeight="bold">{edge.label}</text>
                      {step >= (index <= 2 ? 1 : index <= 6 ? 2 : 3) && (
                        <text x={(sourceNode.x + targetNode.x)/2} y={(sourceNode.y + targetNode.y)/2 + 25} textAnchor="middle" fontSize="13" fill="#0284c7" fontWeight="bold" className="animate-fade-in">{edge.eng}</text>
                      )}
                    </g>
                  );
                })}
                {kalamNodes.map((node) => {
                  if (step === 0 && (node.id === 'sy' || node.id === 'd')) return null;
                  if (step === 1 && (node.type === 'noun' && !['cgoy', 'tap', 'gwglwn'].includes(node.id))) return null;
                  if (step === 2 && (node.id === 'sy' || node.id === 'd')) return null;
                  
                  const fill = node.type === 'verb' ? '#0ea5e9' : '#f59e0b';
                  return (
                    <g key={node.id} className="animate-fade-in hover:scale-110 transition-transform cursor-pointer">
                      <circle cx={node.x} cy={node.y} r="30" fill={fill} stroke="white" strokeWidth="3" className="drop-shadow-sm" />
                      <text x={node.x} y={node.y - 38} textAnchor="middle" fontSize="14" fontWeight="bold" fill="#1e293b">{node.id}</text>
                      <text x={node.x} y={node.y + 5} textAnchor="middle" fontSize="11" fontWeight="bold" fill="white">{node.label.match(/\((.*?)\)/)[1]}</text>
                    </g>
                  );
                })}
              </svg>
            </div>
          </div>
        );
      };

      const KalamMatrixView = () => {
        const stepsInfo = [
          { title: "步驟 1：建立詞彙解構矩陣", desc: "將卡拉姆語動詞拆解為「名詞/副詞」+「通用動詞」。這是一種代數消去法。" },
          { title: "步驟 2：解析通用動詞 in, nŋ, ag", desc: "tap(東西) in = 吃；cgoy(煙) in = 吸煙 ➔ in = 攝入/消耗。\nwdn(眼) nŋ = 看；gos(思想) nŋ = 想 ➔ nŋ = 感知。\nesek(謊) ag = 撒謊；gwglwn(鼾) ag = 打鼾 ➔ ag = 發出聲響。" },
          { title: "步驟 3：解析關鍵修飾詞 (tep, sy)", desc: "gos nŋ(想) vs gos tep nŋ(贊成) ➔ tep = 好的 (想好的)。\nsy d(偷) vs sy bsg(坐某人位置) ➔ sy = 別人的東西/位置。" },
          { title: "步驟 4：進階翻譯推導", desc: "運用已解析的詞彙（kwk笑、tmey壞、am去、ñg水），我們可以完美翻譯出所有句子！" }
        ];

        const matrixData = [
          { w: '1. tap in', r1: 'tap (東西)', r2: 'in (消耗)', mean: step >= 1 ? '吃 (E)' : '?' },
          { w: '2. gos nŋ', r1: 'gos (思想)', r2: 'nŋ (感知)', mean: step >= 1 ? '想 (I)' : '?' },
          { w: '3. gwglwn ag', r1: 'gwglwn (鼾聲)', r2: 'ag (發聲)', mean: step >= 1 ? '打鼾 (C)' : '?' },
          { w: '4. wdn nŋ', r1: 'wdn (眼睛)', r2: 'nŋ (感知)', mean: step >= 1 ? '看 (A)' : '?' },
          { w: '5. sy bsg', r1: 'sy (別人的)', r2: 'bsg (坐)', mean: step >= 2 ? '坐在別人的位置上 (H)' : '?' },
          { w: '6. ag tmwd nŋ', r1: 'ag(聲)+tmwd(耳)', r2: 'nŋ (感知)', mean: step >= 1 ? '聽 (G)' : '?' },
          { w: '7. cgoy in', r1: 'cgoy (煙草)', r2: 'in (消耗)', mean: step >= 1 ? '吸煙 (B)' : '?' },
          { w: '8. gos tep nŋ', r1: 'gos + tep(好)', r2: 'nŋ (感知)', mean: step >= 2 ? '贊成 (J)' : '?' },
          { w: '9. sy d', r1: 'sy (別人的)', r2: 'd (得到)', mean: step >= 2 ? '偷 (D)' : '?' },
          { w: '10. esek ag', r1: 'esek (謊言)', r2: 'ag (發聲)', mean: step >= 1 ? '撒謊 (F)' : '?' },
        ];

        return (
          <div className="flex flex-col h-full bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div className="p-4 bg-indigo-50 border-b border-indigo-100">
              <h3 className="text-lg font-bold text-indigo-900">{stepsInfo[step].title}</h3>
              <p className="text-sm text-indigo-800 mt-1 whitespace-pre-line">{stepsInfo[step].desc}</p>
            </div>
            <div className="flex-1 bg-slate-50 p-6 overflow-auto">
              <table className="w-full text-left border-collapse mb-6 bg-white rounded-lg shadow-sm overflow-hidden">
                <thead>
                  <tr className="bg-slate-100 text-slate-600 text-sm border-b">
                    <th className="p-3">卡拉姆語 (Kalam)</th><th className="p-3">名詞 / 修飾語</th><th className="p-3">通用動詞</th><th className="p-3 text-indigo-600">解答</th>
                  </tr>
                </thead>
                <tbody>
                  {matrixData.map((row, idx) => (
                    <tr key={idx} className={`border-b border-slate-50 ${(step >= 1 && (idx<4 || idx===5 || idx===6 || idx===9)) ? 'bg-indigo-50/50' : (step >= 2 && (idx===4 || idx===7 || idx===8)) ? 'bg-purple-50/50' : ''}`}>
                      <td className="p-3 font-mono font-bold">{row.w}</td><td className="p-3 font-mono">{row.r1}</td><td className="p-3 font-mono">{row.r2}</td><td className="p-3 font-bold text-indigo-600">{row.mean}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              {step >= 3 && (
                <div className="bg-slate-800 text-slate-100 rounded-lg p-5 font-mono text-sm shadow-inner space-y-3 animate-fade-in border-l-4 border-indigo-400">
                  <h4 className="text-indigo-300 font-bold mb-2">翻譯任務正確解答 (b) & (c)</h4>
                  <p>【中翻卡】<br/>
                    <span className="text-slate-400">笑:</span> kwk(笑) + ag(發聲) = <span className="text-white font-bold bg-indigo-600/50 px-1 rounded">kwk ag</span><br/>
                    <span className="text-slate-400">否決:</span> gos(想) + tmey(壞) + nŋ(感知) = <span className="text-white font-bold bg-indigo-600/50 px-1 rounded">gos tmey nŋ</span><br/>
                    <span className="text-slate-400">侵入:</span> sy(別人的地方) + am(去) = <span className="text-white font-bold bg-indigo-600/50 px-1 rounded">sy am</span>
                  </p>
                  <div className="border-t border-slate-600 my-2 pt-2"></div>
                  <p>【卡翻中】<br/>
                    <span className="text-slate-400">tep:</span> = <span className="text-white font-bold bg-purple-600/50 px-1 rounded">好</span><br/>
                    <span className="text-slate-400">sy:</span> = <span className="text-white font-bold bg-purple-600/50 px-1 rounded">別人的東西</span><br/>
                    <span className="text-slate-400">ñg in:</span> ñg(水) + in(消耗) = <span className="text-white font-bold bg-purple-600/50 px-1 rounded">喝</span><br/>
                    <span className="text-slate-400">kmn sy ñag:</span> 飛禽 + 別人的 + 射 = <span className="text-white font-bold bg-purple-600/50 px-1 rounded">盜獵</span>
                  </p>
                </div>
              )}
            </div>
          </div>
        );
      };

      // --- MANX VIEWS ---
      const ManxGraphView = () => {
        const stepsInfo = [
          { title: "步驟 1：尋找共用詞彙 (Overlaps)", desc: "觀察語料，oie 與 cadley 反覆出現。對照翻譯中的「午夜、不眠之夜、冬眠」，推導出交集：oie(夜)、cadley(眠)、mean(中)、geuree(冬)。" },
          { title: "步驟 2：提取時間與季節 (Time & Seasons)", desc: "我們發現了一套時間修飾系統：除了 Geuree(冬)，還有 Arree(春)、Souree(夏)。而修飾時間的詞有 Toshiaght(初)、Mean(中)、Jerrey(末)。" },
          { title: "步驟 3：塞爾特曆法映射 (Celtic Calendar)", desc: "塞爾特文化中，春季始於2月，夏季始於5月，冬季始於11月(萬聖節)。因此 Toshiaght Souree(夏初) 正好對應五月(May)！" },
          { title: "步驟 4：完整網絡與月份推導", desc: "Jerrey Geuree(冬末)=1月；Tosh. Arree(春初)=2月；Mean Souree(仲夏)=6月；Jerrey Souree(夏末)=7月。這是一套完美的自然曆法系統！" }
        ];
        return (
          <div className="flex flex-col h-full bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div className="p-4 bg-emerald-50 border-b border-emerald-100">
              <h3 className="text-lg font-bold text-emerald-900">{stepsInfo[step].title}</h3>
              <p className="text-sm text-emerald-800 mt-1 whitespace-pre-line">{stepsInfo[step].desc}</p>
            </div>
            <div className="flex-1 relative bg-slate-50 min-h-[450px] flex justify-center items-center p-4">
              <svg width="650" height="550" className="max-w-full drop-shadow-md">
                <defs>
                  <marker id="arrow-m" markerWidth="10" markerHeight="7" refX="25" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" /></marker>
                </defs>
                {step >= 0 && manxEdges.map((edge) => {
                  if (step === 0 && edge.id.match(/m[45678]/)) return null; 
                  const sourceNode = manxNodes.find(n => n.id === edge.source);
                  const targetNode = manxNodes.find(n => n.id === edge.target);
                  const lx = edge.lx || (sourceNode.x + targetNode.x)/2;
                  const ly = edge.ly || (sourceNode.y + targetNode.y)/2;
                  let showEng = false;
                  if (edge.id.match(/m[123]/)) showEng = true;
                  if (step >= 2 && edge.id.match(/m[678]/)) showEng = true;
                  if (step >= 3) showEng = true;

                  return (
                    <g key={edge.id} className="animate-fade-in">
                      <line x1={sourceNode.x} y1={sourceNode.y} x2={targetNode.x} y2={targetNode.y} stroke="#cbd5e1" strokeWidth="3" markerEnd="url(#arrow-m)" />
                      <rect x={lx - 45} y={ly - 12} width="90" height="24" rx="4" fill="white" stroke="#e2e8f0" />
                      <text x={lx} y={ly + 4} textAnchor="middle" fontSize="11" fill="#475569" fontWeight="bold">{edge.label}</text>
                      {showEng && (
                        <text x={lx} y={ly + 25} textAnchor="middle" fontSize="13" fill="#10b981" fontWeight="bold" className="animate-fade-in">{edge.eng}</text>
                      )}
                    </g>
                  );
                })}
                {manxNodes.map((node) => {
                  if (step === 0 && node.id.match(/arree|souree|toshiaght|jerrey/)) return null;
                  const fill = node.type === 'core' ? '#f43f5e' : node.type === 'season' ? '#0ea5e9' : '#8b5cf6';
                  return (
                    <g key={node.id} className="animate-fade-in hover:scale-110 transition-transform cursor-pointer">
                      <rect x={node.x - 45} y={node.y - 25} width="90" height="50" rx="12" fill={fill} stroke="white" strokeWidth="3" className="drop-shadow-sm" />
                      <text x={node.x} y={node.y - 5} textAnchor="middle" fontSize="14" fontWeight="bold" fill="white">{node.label.split(' ')[0]}</text>
                      <text x={node.x} y={node.y + 12} textAnchor="middle" fontSize="12" fill="#f1f5f9">{node.label.match(/\((.*?)\)/)[1]}</text>
                    </g>
                  );
                })}
              </svg>
            </div>
          </div>
        );
      };

      const ManxMatrixView = () => {
        const stepsInfo = [
          { title: "步驟 1：基礎交集比對", desc: "將修飾語與核心概念分離。午夜、不眠之夜、冬眠 ➔ 推導出 oie(夜), cadley(眠), geuree(冬)。" },
          { title: "步驟 2：解析季節系統", desc: "Arree(春), Souree(夏) ＋ Toshiaght(初), Mean(中), Jerrey(末)。" },
          { title: "步驟 3：塞爾特曆法對應", desc: "夏初 = 5月，夏中 = 6月，夏末 = 7月；\n冬末 = 1月，春初 = 2月。" },
          { title: "步驟 4：進階翻譯解答", desc: "運用已解析出的規律，進行未出現詞彙的雙向翻譯。" }
        ];

        const matrixData = [
          { w: 'mean oie', r1: 'mean (中)', r2: 'oie (夜)', mean: step >= 0 ? '午夜 (C)' : '?' },
          { w: 'oie gyn cadley', r1: 'gyn (無)', r2: 'oie / cadley', mean: step >= 0 ? '不眠之夜 (H)' : '?' },
          { w: 'cadley geuree', r1: 'cadley (眠)', r2: 'geuree (冬)', mean: step >= 0 ? '冬眠 (F)' : '?' },
          { w: 'Toshiaght Souree', r1: 'Toshiaght (初)', r2: 'Souree (夏)', mean: step >= 2 ? '五月 (G)' : '?' },
          { w: 'Mean Souree', r1: 'Mean (中)', r2: 'Souree (夏)', mean: step >= 2 ? '六月 (E)' : '?' },
          { w: 'Jerrey Geuree', r1: 'Jerrey (末)', r2: 'Geuree (冬)', mean: step >= 2 ? '一月 (B)' : '?' },
        ];

        return (
          <div className="flex flex-col h-full bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div className="p-4 bg-teal-50 border-b border-teal-100">
              <h3 className="text-lg font-bold text-teal-900">{stepsInfo[step].title}</h3>
              <p className="text-sm text-teal-800 mt-1 whitespace-pre-line">{stepsInfo[step].desc}</p>
            </div>
            <div className="flex-1 bg-slate-50 p-6 overflow-auto">
              <table className="w-full text-left border-collapse mb-6 bg-white rounded-lg shadow-sm overflow-hidden">
                <thead>
                  <tr className="bg-slate-100 text-slate-600 text-sm border-b">
                    <th className="p-3">馬恩語詞彙</th><th className="p-3">狀態/時間</th><th className="p-3">核心概念</th><th className="p-3 text-teal-600">翻譯</th>
                  </tr>
                </thead>
                <tbody>
                  {matrixData.map((row, idx) => (
                    <tr key={idx} className={`border-b border-slate-50 ${(step === 0 && idx < 3) ? 'bg-teal-50/50' : (step >= 2 && idx >= 3) ? 'bg-emerald-50/50' : ''}`}>
                      <td className="p-3 font-mono font-bold">{row.w}</td><td className="p-3 font-mono">{row.r1}</td><td className="p-3 font-mono">{row.r2}</td><td className="p-3 font-bold text-teal-600">{row.mean}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              {step >= 3 && (
                <div className="bg-slate-800 text-slate-100 rounded-lg p-5 font-mono text-sm shadow-inner space-y-3 animate-fade-in border-l-4 border-emerald-400">
                  <h4 className="text-emerald-300 font-bold mb-2">翻譯任務解答 (Translations)</h4>
                  <p>9. <span className="text-slate-400">Mean Fouyir (秋天的中間):</span> = <span className="text-white font-bold bg-emerald-600/50 px-1 rounded">九月</span></p>
                  <p>10. <span className="text-slate-400">無限 (無終點):</span> 無(gyn) + 末(jerrey) = <span className="text-white font-bold bg-emerald-600/50 px-1 rounded">gyn jerrey</span></p>
                  <p>11. <span className="text-slate-400">四月 (春末):</span> 末(Jerrey) + 春(Arree) = <span className="text-white font-bold bg-emerald-600/50 px-1 rounded">Jerrey Arree</span></p>
                </div>
              )}
            </div>
          </div>
        );
      };

      // --- RENDER ---
      return (
        <div className="min-h-screen flex flex-col md:flex-row">
          {/* SIDEBAR */}
          <div className="w-full md:w-64 bg-slate-900 text-slate-300 flex flex-col shadow-xl z-10">
            <div className="p-6 bg-slate-950/50 border-b border-slate-800">
              <h1 className="text-xl font-bold text-white flex items-center">
                <IconDashboard />
                語義學模擬器
              </h1>
              <p className="text-xs text-slate-500 mt-2">SPA 獨立運作版</p>
            </div>
            
            <div className="p-4 flex-1">
              <p className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3 px-2">語言選擇</p>
              <button 
                onClick={() => handleViewChange('kalam', null)}
                className={`w-full flex items-center px-4 py-3 mb-2 rounded-lg transition-all ${lang === 'kalam' ? 'bg-indigo-600 text-white shadow-md' : 'hover:bg-slate-800 hover:text-white'}`}
              >
                <IconGlobe />卡拉姆語 (Kalam)
              </button>
              <button 
                onClick={() => handleViewChange('manx', null)}
                className={`w-full flex items-center px-4 py-3 rounded-lg transition-all ${lang === 'manx' ? 'bg-emerald-600 text-white shadow-md' : 'hover:bg-slate-800 hover:text-white'}`}
              >
                <IconBook />馬恩語 (Manx)
              </button>
            </div>

            <div className="p-6 border-t border-slate-800 bg-slate-900">
              <div className="flex items-start text-xs text-slate-400">
                <IconMessage />
                <p>卡拉姆語考驗「通用動詞組合」；馬恩語考驗「曆法與狀態對應」。</p>
              </div>
            </div>
          </div>

          {/* MAIN CONTENT */}
          <div className="flex-1 flex flex-col h-screen overflow-hidden">
            <header className="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center z-10 shadow-sm">
              <h2 className="text-xl font-bold text-slate-800">
                {lang === 'kalam' ? '卡拉姆語：事件與感知分解' : '馬恩語：塞爾特自然曆法'}
              </h2>
              <div className="flex bg-slate-100 p-1 rounded-lg">
                <button 
                  onClick={() => handleViewChange(null, 'graph')} 
                  className={`flex items-center px-4 py-2 rounded-md text-sm font-medium transition-all ${activeMode === 'graph' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-900'}`}
                >
                  <IconNetwork /> 圖表結構法
                </button>
                <button 
                  onClick={() => handleViewChange(null, 'matrix')} 
                  className={`flex items-center px-4 py-2 rounded-md text-sm font-medium transition-all ${activeMode === 'matrix' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-900'}`}
                >
                  <IconGrid /> 矩陣特徵法
                </button>
              </div>
            </header>

            <main className="flex-1 overflow-auto p-4 md:p-8">
              <div className="max-w-4xl mx-auto h-full flex flex-col">
                <div className="flex-1 transition-opacity duration-500">
                  {lang === 'kalam' && activeMode === 'graph' && <KalamGraphView />}
                  {lang === 'kalam' && activeMode === 'matrix' && <KalamMatrixView />}
                  {lang === 'manx' && activeMode === 'graph' && <ManxGraphView />}
                  {lang === 'manx' && activeMode === 'matrix' && <ManxMatrixView />}
                </div>

                <div className="mt-6 bg-white rounded-xl shadow-sm border border-slate-200 p-4 flex justify-between items-center">
                  <button 
                    onClick={() => setStep(Math.max(0, step - 1))} 
                    disabled={step === 0} 
                    className="flex items-center px-5 py-2.5 text-sm font-bold text-slate-700 bg-slate-100 rounded-lg hover:bg-slate-200 disabled:opacity-40 transition-colors"
                  >
                    <IconChevronLeft /> 上一步
                  </button>
                  
                  <div className="flex gap-2 items-center">
                    {[0, 1, 2, 3].map(s => (
                      <div key={s} className={`h-2.5 w-2.5 rounded-full transition-all duration-300 ${step === s ? (lang === 'kalam' ? 'bg-sky-500 scale-125' : 'bg-emerald-500 scale-125') : 'bg-slate-200'}`} />
                    ))}
                  </div>
                  
                  <button 
                    onClick={() => setStep(Math.min(3, step + 1))} 
                    disabled={step === 3} 
                    className={`flex items-center px-5 py-2.5 text-sm font-bold text-white rounded-lg disabled:opacity-40 transition-colors ${lang === 'kalam' ? 'bg-sky-600 hover:bg-sky-700' : 'bg-emerald-600 hover:bg-emerald-700'}`}
                  >
                    下一步 <IconChevronRight />
                  </button>
                </div>
              </div>
            </main>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
